<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Designer | Redirecionando...</title>
    <meta name="description" content="Logos 3D, Sites Modernos e Propagandas que Vendem">
    <meta name="theme-color" content="#00ffff">
    <link rel="icon" type="image/png" href="https://i.ibb.co/zWcHNK8Y/download-We-Resize-com-1.png">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #050510 0%, #0a0a1a 50%, #050510 100%);
            color: #f0f8ff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Fundo com efeito de grade neon */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 50px 50px;
            }
        }

        /* Container Principal */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            text-align: center;
        }

        /* Logo em Movimento */
        .logo-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container {
            width: 100%;
            height: 100%;
            position: relative;
            animation: floatRotate 8s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.6)) 
                    drop-shadow(0 0 40px rgba(0, 255, 255, 0.3));
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(1.1);
        }

        @keyframes floatRotate {
            0%, 100% {
                transform: rotate(0deg) scale(1);
            }
            25% {
                transform: rotate(90deg) scale(1.05);
            }
            50% {
                transform: rotate(180deg) scale(1);
            }
            75% {
                transform: rotate(270deg) scale(1.05);
            }
        }

        /* Anel ao redor da logo */
        .logo-ring {
            position: absolute;
            inset: 0;
            border: 3px solid transparent;
            border-top-color: #00ffff;
            border-right-color: rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            animation: spinRing 3s linear infinite;
            opacity: 0.8;
        }

        @keyframes spinRing {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Texto Principal */
        .content {
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00ffff, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #00ffff;
            margin-bottom: 30px;
            letter-spacing: 1px;
            font-weight: 500;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Contador Regressivo */
        .countdown {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .countdown-text {
            font-size: 0.95rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .countdown-number {
            width: 60px;
            height: 60px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 
                       inset 0 0 10px rgba(0, 255, 255, 0.1);
            animation: countdownPulse 1s ease-in-out infinite;
        }

        @keyframes countdownPulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 
                           inset 0 0 10px rgba(0, 255, 255, 0.1);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.6), 
                           inset 0 0 15px rgba(0, 255, 255, 0.2);
                transform: scale(1.05);
            }
        }

        /* Barra de Progresso */
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #00ccff);
            border-radius: 2px;
            animation: progressFill 7s linear forwards;
            box-shadow: 0 0 10px #00ffff;
        }

        @keyframes progressFill {
            from {
                width: 100%;
            }
            to {
                width: 0%;
            }
        }

        /* Botão de Redirecionamento Manual */
        .redirect-btn {
            margin-top: 30px;
            padding: 12px 35px;
            border: 2px solid #00ffff;
            background: transparent;
            color: #00ffff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .redirect-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .redirect-btn:active {
            transform: translateY(0);
        }

        /* Animação de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        /* Efeito de partículas (decorativo) */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .logo-wrapper {
                width: 200px;
                height: 200px;
            }

            h1 {
                font-size: clamp(1.3rem, 4vw, 2rem);
            }

            .subtitle {
                font-size: 0.95rem;
            }

            .countdown-number {
                width: 50px;
                height: 50px;
                font-size: 1.4rem;
            }

            .progress-bar {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Animada -->
        <div class="logo-wrapper">
            <div class="logo-ring"></div>
            <div class="logo-container">
                <img src="https://i.ibb.co/Ld9hbLYW/redondo-logo-pablodesigner-Photoroom.png" alt="Pablo Designer Logo">
            </div>
        </div>

        <!-- Conteúdo -->
        <div class="content">
            <h1>Pablo Designer</h1>
            <p class="subtitle">Logos 3D • Sites • Certificados • Artes</p>
            
            <!-- Contador Regressivo -->
            <div class="countdown">
                <span class="countdown-text">Redirecionando em:</span>
                <div class="countdown-number" id="countdown">7</div>
            </div>

            <!-- Barra de Progresso -->
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <!-- Botão Manual -->
            <a href="https://pablologomarcas.free.nf/" class="redirect-btn">
                <i class="fas fa-arrow-right"></i> Ir Agora
            </a>
        </div>
    </div>

    <script>
        // Contador regressivo
        let counter = 7;
        const countdownElement = document.getElementById('countdown');

        const interval = setInterval(() => {
            counter--;
            countdownElement.textContent = counter;

            if (counter <= 0) {
                clearInterval(interval);
                window.location.href = 'https://pablologomarcas.free.nf/';
            }
        }, 1000);

        // Criar partículas decorativas (opcional)
        function createParticles() {
            const particleCount = 15;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.cssText = `
                    width: 4px;
                    height: 4px;
                    background: #00ffff;
                    border-radius: 50%;
                    opacity: ${Math.random() * 0.5 + 0.2};
                    left: ${Math.random() * 100}vw;
                    top: ${Math.random() * 100}vh;
                    animation: float ${5 + Math.random() * 5}s infinite ease-in-out;
                `;
                document.body.appendChild(particle);
            }
        }

        // Adicionar estilos de animação para partículas
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0%, 100% {
                    transform: translateY(0px) translateX(0px);
                    opacity: 0.2;
                }
                50% {
                    transform: translateY(-30px) translateX(20px);
                    opacity: 0.6;
                }
            }
        `;
        document.head.appendChild(style);

        // Inicializar partículas
        createParticles();

        // Permitir clique em qualquer lugar para redirecionar
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.redirect-btn')) {
                window.location.href = 'https://pablologomarcas.free.nf/';
            }
        });
    </script>
</body>
</html>
